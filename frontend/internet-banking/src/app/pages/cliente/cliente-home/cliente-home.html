<div class="home-wrapper container-centered">
  <mat-card class="home-card">

    <!-- Saudação / Cabeçalho -->
    <div class="home-header">
      <div>
        <h2 class="saudacao">Olá, {{ nomeCliente }} 👋</h2>
        <div class="conta-info">Conta {{ numeroConta }} · Gerente: {{ nomeGerente }}</div>
      </div>
      <div class="ações-rapidas">
        <small class="conta-info">Último login: {{ ultimoLogin }}</small>
      </div>
    </div>

    <!-- Saldo -->
    <div class="saldo-box">
      <div class="saldo-top">
        <span class="saldo-label">Saldo disponível</span>
      </div>
      <div>
        <span class="saldo-valor" [class.negativo]="saldoNegativo">
          {{ saldoNegativo ? '-' : '' }}R$ {{ (saldoNegativo ? -saldoAtual : saldoAtual) | number:'1.2-2':'pt-BR' }}
        </span>
      </div>
      <div *ngIf="limite > 0">
        <span class="limite-info">Limite: R$ {{ limite | number:'1.2-2':'pt-BR' }}</span>
      </div>
    </div>

    <!-- Menu de operações -->
    <div class="operacoes-grid" role="navigation" aria-label="Operações rápidas">
      <button mat-flat-button class="op-btn deposito" (click)="navegarPara('/deposito')">
        <mat-icon>arrow_downward</mat-icon>
        <span>Depósito</span>
      </button>
      <button mat-flat-button class="op-btn saque" (click)="navegarPara('/saque')">
        <mat-icon>arrow_upward</mat-icon>
        <span>Saque</span>
      </button>
      <button mat-flat-button class="op-btn transferencia" (click)="navegarPara('/transferencia')" [disabled]="true">
        <mat-icon>swap_horiz</mat-icon>
        <span>Transferência</span>
      </button>
      <button mat-flat-button class="op-btn extrato" (click)="navegarPara('/extrato')">
        <mat-icon>receipt_long</mat-icon>
        <span>Extrato</span>
      </button>
      <button mat-flat-button class="op-btn perfil" (click)="navegarPara('/perfil')" [disabled]="true">
        <mat-icon>manage_accounts</mat-icon>
        <span>Meu Perfil</span>
      </button>
      <button mat-flat-button class="op-btn sair" (click)="logout()">
        <mat-icon>logout</mat-icon>
        <span>Sair</span>
      </button>
    </div>

  </mat-card>
</div>
