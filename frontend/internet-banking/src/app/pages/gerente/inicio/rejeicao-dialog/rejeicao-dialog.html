<div class="dialog-wrapper">

  <div class="dialog-header">
    <mat-icon class="dialog-icon">warning</mat-icon>
    <h2>Recusar Cadastro</h2>
  </div>

  <p class="dialog-descricao">
    Informe o motivo da recusa de <strong>{{ data.nomeCliente }}</strong>.
    Este motivo será registrado e enviado ao cliente por e-mail.
  </p>

  <mat-form-field appearance="outline" class="full-width">
    <mat-label>Motivo da recusa</mat-label>
    <textarea
      matInput
      [(ngModel)]="motivo"
      rows="4"
      placeholder="Ex: Documentação incompleta, CPF inválido..."
    ></textarea>
    <mat-hint>Seja claro e objetivo no motivo informado.</mat-hint>
  </mat-form-field>

  <div class="dialog-acoes">
    <button mat-stroked-button (click)="cancelar()">
      Cancelar
    </button>
    <button mat-flat-button class="btn-confirmar" (click)="confirmar()" [disabled]="!motivo.trim()">
      <mat-icon>close</mat-icon>
      Confirmar Recusa
    </button>
  </div>

</div>
