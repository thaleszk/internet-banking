<div class="background">

<mat-card class="card">

<h2>Autocadastro</h2>
<p>Preencha os dados para solicitar abertura de conta</p>

<form [formGroup]="form" (ngSubmit)="solicitarCadastro()">

<h3>Dados Pessoais</h3>

<div class="grid">

<mat-form-field appearance="outline">
<mat-label>Nome Completo</mat-label>
<input matInput formControlName="nome">
</mat-form-field>

<mat-form-field appearance="outline">
<mat-label>CPF</mat-label>
<input matInput placeholder="000.000.000-00" formControlName="cpf">
</mat-form-field>

<mat-form-field appearance="outline">
<mat-label>E-mail</mat-label>
<input matInput formControlName="email">
</mat-form-field>

<mat-form-field appearance="outline">
<mat-label>Telefone</mat-label>
<input matInput placeholder="(00) 00000-0000" formControlName="telefone">
</mat-form-field>

<mat-form-field appearance="outline" class="full">
<mat-label>Salário Mensal</mat-label>
<input matInput type="number" formControlName="salario">
</mat-form-field>

</div>

<h3>Endereço</h3>

<div class="grid">

<mat-form-field appearance="outline">
<mat-label>CEP</mat-label>
<input matInput placeholder="00000-000" formControlName="cep">
</mat-form-field>

<mat-form-field appearance="outline">
<mat-label>Logradouro</mat-label>
<input matInput formControlName="logradouro">
</mat-form-field>

<mat-form-field appearance="outline">
<mat-label>Número</mat-label>
<input matInput formControlName="numero">
</mat-form-field>

<mat-form-field appearance="outline">
<mat-label>Complemento</mat-label>
<input matInput formControlName="complemento">
</mat-form-field>

<mat-form-field appearance="outline">
<mat-label>Cidade</mat-label>
<input matInput formControlName="cidade">
</mat-form-field>

<mat-form-field appearance="outline">
<mat-label>Estado</mat-label>
<input matInput formControlName="estado">
</mat-form-field>

</div>

<button mat-raised-button color="primary" type="submit" [disabled]="form.invalid">
Solicitar Cadastro
</button>

</form>

</mat-card>

</div>
