<div class="operacao-wrapper">
  <mat-card class="operacao-card">

    <!-- Cabeçalho -->
    <div class="operacao-header deposito-header">
      <mat-icon class="operacao-icon">arrow_downward</mat-icon>
      <h2>Depósito</h2>
    </div>

    <!-- Saldo atual -->
    <div class="saldo-info">
      <span class="saldo-label">Saldo atual</span>
      <span class="saldo-valor" [class.negativo]="saldoNegativo">
        {{ saldoNegativo ? '-' : '' }}R$ {{ (saldoNegativo ? -saldoAtual : saldoAtual) | number:'1.2-2':'pt-BR' }}
      </span>
    </div>

    <!-- Mensagem de sucesso -->
    <div class="msg-sucesso" *ngIf="sucesso">
      <mat-icon>check_circle</mat-icon>
      <span>{{ sucesso }}</span>
    </div>

    <!-- Mensagem de erro -->
    <div class="msg-erro" *ngIf="erro">
      <mat-icon>error</mat-icon>
      <span>{{ erro }}</span>
    </div>

    <!-- Formulário -->
    <form [formGroup]="form" (ngSubmit)="depositar()">

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Valor do depósito (R$)</mat-label>
        <input
          matInput
          type="number"
          formControlName="valor"
          placeholder="0,00"
          min="0.01"
          step="0.01"
        />
        <mat-icon matPrefix>attach_money</mat-icon>
        <mat-error *ngIf="form.get('valor')?.hasError('required')">
          Informe o valor do depósito
        </mat-error>
        <mat-error *ngIf="form.get('valor')?.hasError('min')">
          O valor deve ser maior que R$ 0,00
        </mat-error>
      </mat-form-field>

      <div class="botoes">
        <button mat-stroked-button type="button" (click)="voltar()" [disabled]="carregando">
          <mat-icon>arrow_back</mat-icon> Voltar
        </button>
        <button mat-flat-button class="btn-confirmar" type="submit" [disabled]="form.invalid || carregando">
          <mat-spinner diameter="20" *ngIf="carregando"></mat-spinner>
          <span *ngIf="!carregando">Confirmar Depósito</span>
        </button>
      </div>

    </form>

  </mat-card>
</div>
