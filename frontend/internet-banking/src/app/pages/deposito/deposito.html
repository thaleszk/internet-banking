<mat-card style="padding: 40px; border-radius: 16px; max-width: 500px; margin: 0 auto;">
  <h2>Realizar Depósito</h2>
  <form (ngSubmit)="depositar()" #depositoForm="ngForm">
    <mat-form-field appearance="outline" style="width: 100%;">
      <mat-label>Valor do Depósito (R$)</mat-label>
      <input matInput type="number" [(ngModel)]="valor" name="valor" required min="0.01" step="0.01">
    </mat-form-field>
    <button mat-raised-button color="primary" type="submit" [disabled]="!depositoForm.valid" style="width: 100%; margin-top: 20px;">
      Confirmar Depósito
    </button>
  </form>
</mat-card>
