<div class="login-container">
  <div class="login-card">
    <h1>BANTADS</h1>
    <h2>Internet Banking</h2>

    <form [formGroup]="form" (ngSubmit)="fazerLogin()">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>E-mail</mat-label>
        <input matInput formControlName="email" type="email" required>
        <mat-error *ngIf="form.get('email')?.hasError('required')">
          E-mail é obrigatório
        </mat-error>
        <mat-error *ngIf="form.get('email')?.hasError('email')">
          E-mail inválido
        </mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Senha</mat-label>
        <input matInput formControlName="senha" [type]="mostrarSenha ? 'text' : 'password'" required>
        <button mat-icon-button matSuffix (click)="mostrarSenha = !mostrarSenha" type="button">
          <mat-icon>{{ mostrarSenha ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>
        <mat-error *ngIf="form.get('senha')?.hasError('required')">
          Senha é obrigatória
        </mat-error>
      </mat-form-field>

      <div *ngIf="erro" class="erro-mensagem">
        {{ erro }}
      </div>

      <button mat-raised-button color="primary" class="full-width" [disabled]="form.invalid || carregando">
        {{ carregando ? 'Entrando...' : 'Entrar' }}
      </button>
    </form>

    <div class="divider"></div>

    <p class="texto-cadastro">
      Novo cliente? 
      <a routerLink="/cadastro">Faça seu autocadastro aqui.</a>
    </p>
  </div>
</div>
