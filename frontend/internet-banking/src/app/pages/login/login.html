<div class="login-wrapper">
    <mat-card class="login-card">
  
      <div class="login-header">
        <span class="login-icon">🏦</span>
        <h1 class="login-title">BAN<strong>TADS</strong></h1>
        <p class="login-subtitle">Acesse sua conta</p>
      </div>
  
      <form [formGroup]="form" (ngSubmit)="login()">
  
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>E-mail</mat-label>
          <input matInput type="email" formControlName="email" autocomplete="email" />
          <mat-icon matSuffix>email</mat-icon>
          <mat-error *ngIf="form.get('email')?.hasError('required')">E-mail é obrigatório</mat-error>
          <mat-error *ngIf="form.get('email')?.hasError('email')">E-mail inválido</mat-error>
        </mat-form-field>
  
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Senha</mat-label>
          <input matInput [type]="hidePassword ? 'password' : 'text'" formControlName="senha" autocomplete="current-password" />
          <button mat-icon-button matSuffix type="button" (click)="hidePassword = !hidePassword">
            <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
          <mat-error *ngIf="form.get('senha')?.hasError('required')">Senha é obrigatória</mat-error>
        </mat-form-field>
  
        <button mat-flat-button class="btn-login" type="submit" [disabled]="form.invalid">
          Entrar
        </button>
  
      </form>
  
      <div class="login-footer">
        <span>Não tem conta?</span>
        <a routerLink="/">Solicitar cadastro</a>
      </div>
  
    </mat-card>
  </div>
