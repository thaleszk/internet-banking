<div class="login-container">
  <div class="login-shell">
    <div class="login-card">
      <div class="brand-mark">
        <span>BT</span>
      </div>

      <p class="eyebrow">Internet Banking Corporativo</p>
      <h1>BANTADS</h1>
      <h2>Acesse sua conta com segurança</h2>

      <form [formGroup]="form" (ngSubmit)="fazerLogin()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>E-mail</mat-label>
          <input matInput formControlName="email" type="email" required>
          <mat-error *ngIf="form.get('email')?.hasError('required')">
            E-mail é obrigatório
          </mat-error>
          <mat-error *ngIf="form.get('email')?.hasError('email')">
            E-mail inválido
          </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Senha</mat-label>
          <input matInput formControlName="senha" [type]="mostrarSenha ? 'text' : 'password'" required>
          <button mat-icon-button matSuffix (click)="mostrarSenha = !mostrarSenha" type="button">
            <mat-icon>{{ mostrarSenha ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
          <mat-error *ngIf="form.get('senha')?.hasError('required')">
            Senha é obrigatória
          </mat-error>
        </mat-form-field>

        <div *ngIf="erro" class="erro-mensagem">
          {{ erro }}
        </div>

        <button mat-raised-button color="primary" class="full-width login-button" [disabled]="form.invalid || carregando">
          {{ carregando ? 'Entrando...' : 'Entrar' }}
        </button>
      </form>

      <div class="divider"></div>

      <p class="texto-cadastro">
        Novo cliente?
        <a routerLink="/cadastro">Faça seu autocadastro aqui.</a>
      </p>

      <div class="security-note">
        <mat-icon>verified_user</mat-icon>
        <span>Ambiente protegido para clientes, gerentes e administradores.</span>
      </div>
    </div>
  </div>
</div>
