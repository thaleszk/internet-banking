<div class="layout">

  <!-- ── Navbar superior ─────────────────────────────────────────────── -->
  <header class="header">
    <div class="header-left">
      <div class="logo">
        <span class="logo-icon">🏦</span>
        <span class="logo-text">BAN<strong>TADS</strong></span>
      </div>
      <span class="logo-tagline">Internet Banking</span>
    </div>

    <nav class="header-nav" *ngIf="isLoggedIn">
      <a class="nav-link" routerLink="/cliente/inicio"    routerLinkActive="active" *ngIf="perfil === 'CLIENTE'">Início</a>
      <a class="nav-link" routerLink="/deposito" routerLinkActive="active" *ngIf="perfil === 'CLIENTE'">Depósito</a>
      <a class="nav-link" routerLink="/cliente/transferencia"   routerLinkActive="active" *ngIf="perfil === 'CLIENTE'">Transferência</a>
      <a class="nav-link" routerLink="/cliente/extrato"   routerLinkActive="active" *ngIf="perfil === 'CLIENTE'">Extrato</a>
      <a class="nav-link" routerLink="/gerente/inicio"    routerLinkActive="active" *ngIf="perfil === 'GERENTE'">Aprovações</a>
      <a class="nav-link" routerLink="/gerente/clientes"  routerLinkActive="active" *ngIf="perfil === 'GERENTE'">Clientes</a>
      <a class="nav-link" routerLink="/admin/inicio"      routerLinkActive="active" *ngIf="perfil === 'ADMIN'">Dashboard</a>
      <a class="nav-link" routerLink="/admin/gerentes"    routerLinkActive="active" *ngIf="perfil === 'ADMIN'">Gerentes</a>
      <a class="nav-link" routerLink="/admin/relatorio"   routerLinkActive="active" *ngIf="perfil === 'ADMIN'">Relatório</a>
    </nav>

    <div class="header-right">
      <span class="username" *ngIf="isLoggedIn">{{ nomeUsuario }}</span>
      <button mat-icon-button *ngIf="isLoggedIn" (click)="logout()" title="Sair">
        <mat-icon>logout</mat-icon>
      </button>
    </div>
  </header>

  <!-- ── Conteúdo principal ───────────────────────────────────────────── -->
  <main class="content">
    <router-outlet></router-outlet>
  </main>

  <!-- ── Rodapé ───────────────────────────────────────────────────────── -->
  <footer class="footer">
    <span>© 2025 BANTADS — UFPR · TADS · DS152/DAC</span>
  </footer>

</div>
