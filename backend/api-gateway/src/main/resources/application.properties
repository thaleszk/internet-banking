spring.application.name=api-gateway
server.port=8080

spring.cloud.gateway.server.webflux.routes[0].id=auth-service
spring.cloud.gateway.server.webflux.routes[0].uri=${AUTH_SERVICE_URL:http://microservice-auth:8081}
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/login,/logout,/auth/**
spring.cloud.gateway.server.webflux.routes[0].filters[0]=RewritePath=^/login$,/auth/login
spring.cloud.gateway.server.webflux.routes[0].filters[1]=RewritePath=^/logout$,/auth/logout

spring.cloud.gateway.server.webflux.routes[1].id=customer-self-registration
spring.cloud.gateway.server.webflux.routes[1].uri=${ORCHESTRATOR_SERVICE_URL:http://microservice-orchestrator:8085}
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/clientes
spring.cloud.gateway.server.webflux.routes[1].predicates[1]=Method=POST
spring.cloud.gateway.server.webflux.routes[1].filters[0]=RewritePath=^/clientes$,/customer-self-registration

spring.cloud.gateway.server.webflux.routes[2].id=customer-service
spring.cloud.gateway.server.webflux.routes[2].uri=${CUSTOMER_SERVICE_URL:http://microservice-customer:8082}
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/clientes,/clientes/**,/customers/**
spring.cloud.gateway.server.webflux.routes[2].filters[0]=RewritePath=^/clientes$,/customers
spring.cloud.gateway.server.webflux.routes[2].filters[1]=RewritePath=^/clientes/(?<segment>.*),/customers/$\{segment}

spring.cloud.gateway.server.webflux.routes[3].id=account-service
spring.cloud.gateway.server.webflux.routes[3].uri=${ACCOUNT_SERVICE_URL:http://microservice-account:8083}
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/contas,/contas/**,/accounts/**
spring.cloud.gateway.server.webflux.routes[3].filters[0]=RewritePath=^/contas$,/accounts
spring.cloud.gateway.server.webflux.routes[3].filters[1]=RewritePath=^/contas/(?<segment>.*),/accounts/$\{segment}

spring.cloud.gateway.server.webflux.routes[4].id=manager-service
spring.cloud.gateway.server.webflux.routes[4].uri=${MANAGER_SERVICE_URL:http://microservice-manager:8084}
spring.cloud.gateway.server.webflux.routes[4].predicates[0]=Path=/gerentes,/gerentes/**,/managers/**
spring.cloud.gateway.server.webflux.routes[4].filters[0]=RewritePath=^/gerentes$,/managers
spring.cloud.gateway.server.webflux.routes[4].filters[1]=RewritePath=^/gerentes/(?<segment>.*),/managers/$\{segment}

spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowed-origins=http://localhost:4200
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowed-headers=*
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allow-credentials=true

spring.cloud.gateway.server.webflux.default-filters[0]=DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials

# JWT â€” deve ser igual ao secret do microservice-auth
jwt.secret=bantads-secret-key-for-jwt-signing-2025-ufpr-tads-dac-ds152

# Logging
logging.level.org.springframework.cloud.gateway=DEBUG
