services:
  postgres:
    image: postgres:16
    container_name: bantads-postgres
    environment:
      POSTGRES_DB: bantadsdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mongo-auth:
    image: mongo:7
    container_name: auth-mongo
    environment:
      MONGO_INITDB_DATABASE: authdb
    ports:
      - "27017:27017"
    volumes:
      - mongo_auth_data:/data/db

  rabbitmq:
    image: rabbitmq:3-management
    container_name: bantads-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Console web (http://localhost:15672)
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    ports:
      - "8000:8080"
    environment:
      - AUTH_SERVICE_URL=http://microservice-auth:8081
      - CUSTOMER_SERVICE_URL=http://microservice-customer:8082
      - ACCOUNT_SERVICE_URL=http://microservice-account:8083
      - MANAGER_SERVICE_URL=http://microservice-manager:8084
      - ORCHESTRATOR_SERVICE_URL=http://microservice-orchestrator:8085
    depends_on:
      - microservice-auth
      - microservice-customer
      - microservice-account
      - microservice-manager
      - microservice-orchestrator

  microservice-auth:
    build:
      context: ./microservice-auth
      dockerfile: Dockerfile
    container_name: microservice-auth
    ports:
      - "8081:8080"
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://mongo-auth:27017/authdb
      - SPRING_RABBITMQ_HOST=rabbitmq
    depends_on:
      - mongo-auth
      - rabbitmq

  microservice-customer:
    build:
      context: ./microservice-customer
      dockerfile: Dockerfile
    container_name: microservice-customer
    ports:
      - "8082:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/bantadsdb?currentSchema=customer
      - SPRING_FLYWAY_SCHEMAS=customer
      - SPRING_JPA_PROPERTIES_HIBERNATE_DEFAULT_SCHEMA=customer
      - AUTH_SERVICE_URL=http://microservice-auth:8081
      - ACCOUNT_SERVICE_URL=http://microservice-account:8083
      - MANAGER_SERVICE_URL=http://microservice-manager:8084
      - SPRING_RABBITMQ_HOST=rabbitmq
    depends_on:
      - postgres
      - microservice-auth
      - microservice-account
      - microservice-manager
      - rabbitmq

  microservice-account:
    build:
      context: ./microservice-account
      dockerfile: Dockerfile
    container_name: microservice-account
    ports:
      - "8083:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/bantadsdb?currentSchema=account
      - SPRING_FLYWAY_SCHEMAS=account
      - SPRING_JPA_PROPERTIES_HIBERNATE_DEFAULT_SCHEMA=account
      - MANAGER_SERVICE_URL=http://microservice-manager:8084
      - SPRING_RABBITMQ_HOST=rabbitmq
    depends_on:
      - postgres
      - rabbitmq

  microservice-manager:
    build:
      context: ./microservice-manager/microservice-manager
      dockerfile: Dockerfile
    container_name: microservice-manager
    ports:
      - "8084:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/bantadsdb?currentSchema=manager
      - SPRING_FLYWAY_SCHEMAS=manager
      - SPRING_JPA_PROPERTIES_HIBERNATE_DEFAULT_SCHEMA=manager
      - AUTH_SERVICE_URL=http://microservice-auth:8081
      - ACCOUNT_SERVICE_URL=http://microservice-account:8083
      - SPRING_RABBITMQ_HOST=rabbitmq
    depends_on:
      - postgres
      - microservice-auth
      - rabbitmq

  microservice-orchestrator:
    build:
      context: ./microservice-orchestrator
      dockerfile: Dockerfile
    container_name: microservice-orchestrator
    ports:
      - "8085:8085"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/bantadsdb?currentSchema=orchestrator
      - SPRING_FLYWAY_SCHEMAS=orchestrator
      - SPRING_JPA_PROPERTIES_HIBERNATE_DEFAULT_SCHEMA=orchestrator
      - SPRING_RABBITMQ_HOST=rabbitmq
      - CUSTOMER_SERVICE_URL=http://microservice-customer:8082
    depends_on:
      - postgres
      - rabbitmq

volumes:
  postgres_data:
  mongo_auth_data:
  rabbitmq_data:
